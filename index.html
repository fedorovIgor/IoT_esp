<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанция ESP32 Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="loginCard" class="bg-gray-800 p-6 rounded-xl shadow-lg w-full max-w-md hidden">
        <h2 class="text-2xl font-bold mb-4 text-center text-blue-400">Вход в панель управления</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email в Firebase</label>
                <input type="email" id="emailInput" class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Пароль</label>
                <input type="password" id="passwordInput" class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
            </div>
            <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-500 font-bold p-2 rounded transition">Войти</button>
            <p id="loginError" class="text-red-400 text-sm text-center hidden"></p>
        </div>
    </div>

    <div id="dashboard" class="w-full max-w-6xl bg-gray-800 p-6 rounded-xl shadow-lg hidden">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b border-gray-700 pb-4">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-bold text-blue-400">Мониторинг ESP32_01</h1>
                    <div id="statusBadge"></div>
                </div>
                <p id="statusLabel" class="text-sm text-gray-400 mt-1">Подключение к базе данных...</p>
            </div>
            <button id="logoutBtn" class="bg-red-600 hover:bg-red-500 text-sm font-semibold px-4 py-2 rounded transition self-end sm:self-auto">Выйти</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-gray-900 p-4 rounded-xl border border-red-500/30 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider">Температура</p>
                <p id="card-temp" class="text-2xl md:text-3xl font-bold text-red-400 mt-1">-- °C</p>
            </div>
            <div class="bg-gray-900 p-4 rounded-xl border border-blue-500/30 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider">Влажность</p>
                <p id="card-hum" class="text-2xl md:text-3xl font-bold text-blue-400 mt-1">-- %</p>
            </div>
            <div class="bg-gray-900 p-4 rounded-xl border border-emerald-500/30 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider">Давление</p>
                <p id="card-press" class="text-2xl md:text-3xl font-bold text-emerald-400 mt-1">-- мм</p>
            </div>
            <div class="bg-gray-900 p-4 rounded-xl border border-amber-500/30 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider">Освещение</p>
                <p id="card-lux" class="text-2xl md:text-3xl font-bold text-amber-400 mt-1">-- Lx</p>
            </div>
        </div>

        <div class="flex flex-wrap gap-4 mb-4 bg-gray-900 p-3 rounded-lg border border-gray-700 text-xs md:text-sm">
            <label class="flex items-center gap-2 cursor-pointer text-red-400">
                <input type="checkbox" id="chk-temp" checked class="w-4 h-4 accent-red-500"> Температура
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-blue-400">
                <input type="checkbox" id="chk-hum" checked class="w-4 h-4 accent-blue-500"> Влажность
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-emerald-400">
                <input type="checkbox" id="chk-press" checked class="w-4 h-4 accent-emerald-500"> Давление
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-amber-400">
                <input type="checkbox" id="chk-lux" checked class="w-4 h-4 accent-amber-500"> Освещенность (Log)
            </label>
        </div>
        
        <div class="relative w-full h-[50vh] bg-gray-950 p-2 rounded-lg border border-gray-700">
            <canvas id="weatherChart"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, query, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
          apiKey: "AIzaSyDHb1Mo-_LBPmNMqanD-g4ekpIOtI80KXI",
          authDomain: "iot-rain-3523b.firebaseapp.com",
          databaseURL: "https://iot-rain-3523b-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "iot-rain-3523b",
          storageBucket: "iot-rain-3523b.firebasestorage.app",
          messagingSenderId: "1066652668511",
          appId: "1:1066652668511:web:9b8674a6e8a8c7d00141ea",
          measurementId: "G-H31Z00N67W"
        };

        // Инициализация Firebase модулей
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Константы конфигурации интерфейса
        const SEND_INTERVAL_MIN = 30; // Планируемый интервал отправки пакетов с ESP32 в минутах

        let myChart = null;
        let unsubscribeData = null; // Хранилище коллбека отписки от WebSocket базы данных

        // UI Элементы
        const loginCard = document.getElementById('loginCard');
        const dashboard = document.getElementById('dashboard');
        const statusLabel = document.getElementById('statusLabel');
        const statusBadge = document.getElementById('statusBadge');
        const loginError = document.getElementById('loginError');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');

        // Глобальные конфигурации для связки чекбоксов и осей графика
        const checkboxConfigs = [
            { id: 'chk-temp', index: 0, axis: 'yTemp' },
            { id: 'chk-hum', index: 1, axis: 'yHum' },
            { id: 'chk-press', index: 2, axis: 'yPress' },
            { id: 'chk-lux', index: 3, axis: 'yLux' }
        ];

        // НАБЛЮДАТЕЛЬ ЗА СЕССИЕЙ ПОЛЬЗОВАТЕЛЯ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginCard.classList.add('hidden');
                dashboard.classList.remove('hidden');
                startDataSubscription();
            } else {
                stopDataSubscription();
                destroyChart();
                dashboard.classList.add('hidden');
                loginCard.classList.remove('hidden');
                if (localStorage.getItem('fb_email')) {
                    emailInput.value = localStorage.getItem('fb_email');
                }
            }
        });

        // ПЕРВИЧНАЯ ИНИЦИАЛИЗАЦИЯ ОБРАБОТЧИКОВ СОБЫТИЙ (Выполняется строго один раз)
        document.getElementById('loginBtn').addEventListener('click', async () => {
            loginError.classList.add('hidden');
            try {
                await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
                localStorage.setItem('fb_email', emailInput.value);
            } catch (error) {
                loginError.innerText = "Ошибка: " + error.message;
                loginError.classList.remove('hidden');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        checkboxConfigs.forEach(cfg => {
            document.getElementById(cfg.id).addEventListener('change', (e) => {
                if (myChart) {
                    myChart.setDatasetVisibility(cfg.index, e.target.checked);
                    myChart.options.scales[cfg.axis].display = e.target.checked;
                    myChart.update('none'); // Оптимизация перерисовки без анимаций
                }
            });
        });

        // СТРИМИНГ ДАННЫХ ИЗ FIREBASE REALTIME DATABASE
        function startDataSubscription() {
            stopDataSubscription(); // Гарантированный сброс висящих подписок
            statusLabel.innerText = "Синхронизация с базой...";
            
            // Фильтрация на сервере Firebase: берем строго последние 48 блоков (ISO8601 ключи сортируются лексикографически)
            const logsQuery = query(ref(db, '/devices/ESP32_01/logs'), limitToLast(48));

            unsubscribeData = onValue(logsQuery, (snapshot) => {
                const logs = snapshot.val();
                if (!logs) {
                    statusLabel.innerText = "Устройство еще не отправляло логи или база пуста.";
                    return;
                }

                const allReadings = [];
                Object.keys(logs).forEach(timeKey => {
                    const block = logs[timeKey];
                    if (block && block.readings) {
                        // Извлекаем только массивы показаний, полностью минуя служебный узел dropped_info
                        Object.values(block.readings).forEach(item => {
                            if (item && typeof item.ts === 'number') {
                                allReadings.push(item);
                            }
                        });
                    }
                });

                if (allReadings.length === 0) {
                    statusLabel.innerText = "Структура логов найдена, но валидных телеметрических точек внутри нет.";
                    return;
                }

                // Надежная клиентская сортировка по временной метке Unix
                allReadings.sort((a, b) => a.ts - b.ts);
                
                // Жесткий срез данных для предотвращения перегрузки оперативной памяти браузера
                const limitedReadings = allReadings.slice(-300);

                // Апдейт верхнего информационного табло
                const lastPoint = limitedReadings[limitedReadings.length - 1];
                updateWidgets(lastPoint);

                // Преобразование массивов для передачи в движок Chart.js с жестким приведением типов
                const labels = limitedReadings.map(pt => new Date(pt.ts * 1000).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }));
                const temps = limitedReadings.map(pt => Number(pt.temp));
                const hums = limitedReadings.map(pt => Number(pt.hum));
                
                // Конвертация гектопаскалей (hPa) от BME280 в миллиметры ртутного столба
                const press = limitedReadings.map(pt => Math.round(Number(pt.press) * 0.750062)); 
                
                // Логарифмическая шкала падает при значениях <= 0, подменяем абсолютную темноту на единицу
                const lux = limitedReadings.map(pt => {
                    const l = Number(pt.lux);
                    return l <= 0 ? 1 : l;
                });

                updateChart(labels, temps, hums, press, lux);
            }, (error) => {
                statusLabel.innerText = "Ошибка доступа: " + error.message;
            });
        }

        // РАСЧЕТ ИНДИКАТОРОВ И СТАТУСА СВЕЖЕСТИ ДАННЫХ
        function updateWidgets(lastPoint) {
            const rawTemp = Number(lastPoint.temp);
            const rawHum = Number(lastPoint.hum);
            const rawPress = Number(lastPoint.press);
            const rawLux = Number(lastPoint.lux);

            // Безопасный вывод текущих значений в карточки (с проверкой на корректность чисел NaN)
            document.getElementById('card-temp').innerText = (isNaN(rawTemp) ? "--" : rawTemp.toFixed(1)) + " °C";
            document.getElementById('card-hum').innerText = (isNaN(rawHum) ? "--" : Math.round(rawHum)) + " %";
            document.getElementById('card-press').innerText = (isNaN(rawPress) ? "--" : Math.round(rawPress * 0.750062)) + " мм";
            document.getElementById('card-lux').innerText = (isNaN(rawLux) ? "--" : Math.round(rawLux)) + " Lx";

            const lastDate = new Date(lastPoint.ts * 1000);
            const diffMinutes = Math.floor((Date.now() - lastDate.getTime()) / 60000);

            // Вывод даты в соответствии с текущей временной зоной операционной системы пользователя
            statusLabel.innerText = `Данные от: ${lastDate.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`;

            // Динамический расчет статуса соединения на основе константы отправки с запасом в 5 минут
            if (diffMinutes < (SEND_INTERVAL_MIN + 5)) { 
                statusBadge.innerHTML = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-900/50 text-green-400 border border-green-500/30"><span class="w-2 h-2 mr-1.5 bg-green-500 rounded-full animate-pulse"></span>Онлайн</span>`;
            } else {
                const hours = Math.floor(diffMinutes / 60);
                const days = Math.floor(hours / 24);
                let timeAgo = `${diffMinutes} мин. назад`;
                
                if (days > 0) {
                    timeAgo = `${days} дн. назад`;
                } else if (hours > 0) {
                    timeAgo = `${hours} ч. назад`;
                }
                
                statusBadge.innerHTML = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-900/50 text-red-400 border border-red-500/30"><span class="w-2 h-2 mr-1.5 bg-red-500 rounded-full"></span>Офлайн (${timeAgo})</span>`;
            }
        }

        function stopDataSubscription() {
            if (unsubscribeData) {
                unsubscribeData(); // Закрываем WebSocket-соединение с инстансом БД Firebase
                unsubscribeData = null;
            }
        }

        function destroyChart() {
            if (myChart) {
                myChart.destroy(); // Полная очистка Canvas контекста во избежание утечек памяти RAM
                myChart = null;
            }
        }

        // КОНФИГУРАЦИЯ И ОТРИСОВКА СЛОЖНОГО МУЛЬТИОСЕВОГО ГРАФИКА
        function updateChart(labels, temps, hums, press, lux) {
            const ctx = document.getElementById('weatherChart').getContext('2d');

            // Если инстанс уже существует — просто накатываем массивы данных
            if (myChart) {
                myChart.data.labels = labels;
                myChart.data.datasets[0].data = temps;
                myChart.data.datasets[1].data = hums;
                myChart.data.datasets[2].data = press;
                myChart.data.datasets[3].data = lux;
                myChart.update('none'); 
                return;
            }

            // Создание нового инстанса. Видимость шкал считывается напрямую со статуса чекбоксов на момент инициализации
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Температура', data: temps, borderColor: '#ef4444', backgroundColor: 'transparent', yAxisID: 'yTemp', tension: 0.2, borderWidth: 2, pointRadius: 1 },
                        { label: 'Влажность', data: hums, borderColor: '#3b82f6', backgroundColor: 'transparent', yAxisID: 'yHum', tension: 0.2, borderWidth: 2, pointRadius: 1 },
                        { label: 'Давление', data: press, borderColor: '#10b981', backgroundColor: 'transparent', yAxisID: 'yPress', tension: 0.2, borderWidth: 2, pointRadius: 1 },
                        { label: 'Освещенность', data: lux, borderColor: '#f59e0b', backgroundColor: 'transparent', yAxisID: 'yLux', tension: 0.2, borderWidth: 2, pointRadius: 1 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } },
                        yTemp: { type: 'linear', position: 'left', display: document.getElementById('chk-temp').checked, grid: { color: '#374151' }, ticks: { color: '#ef4444' }, title: { display: true, text: '°C', color: '#ef4444' } },
                        yHum: { type: 'linear', position: 'right', display: document.getElementById('chk-hum').checked, grid: { drawOnChartArea: false }, ticks: { color: '#3b82f6' }, title: { display: true, text: '%', color: '#3b82f6' } },
                        yPress: { type: 'linear', position: 'left', display: document.getElementById('chk-press').checked, grid: { drawOnChartArea: false }, ticks: { color: '#10b981' }, title: { display: true, text: 'мм рт.ст.', color: '#10b981' } },
                        // Логарифмическая ось для Lux предотвращает сжатие графиков в темное время суток при дневных пиках до 65к Lux
                        yLux: { 
                            type: 'logarithmic', 
                            position: 'right', 
                            display: document.getElementById('chk-lux').checked, 
                            grid: { drawOnChartArea: false }, 
                            ticks: { color: '#f59e0b', callback: function(value) { return Number(value).toString(); } }, 
                            title: { display: true, text: 'Lux (Log)', color: '#f59e0b' }, 
                            min: 1 
                        }
                    },
                    plugins: { legend: { display: false } } // Дефолтная легенда скрыта ради кастомных чекбоксов Tailwind
                }
            });

            // Накатываем стартовую видимость линий датасетов, опираясь на HTML галочки
            checkboxConfigs.forEach(cfg => {
                myChart.setDatasetVisibility(cfg.index, document.getElementById(cfg.id).checked);
            });
            myChart.update('none');
        }
    </script>
</body>
</html>
